version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: "gaman-microservice/notification-service/gen"
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
inputs:
  - directory: ../protos
    paths:
      - ../protos/proto/common
