type: google.api.Service
config_version: 3

http:
  rules:
    # auth
    - selector: user.v1.AuthService.Login
      post: /v1/auth/login
      body: "*"
    - selector: user.v1.AuthService.GetMyProfile
      get: /v1/auth/profile
    - selector: user.v1.AuthService.UpdateMyProfile
      patch: /v1/auth/profile
      body: "*"
    # forgot password
    - selector: user.v1.ForgotPasswordService.ForgotPassword
      post: /v1/auth/forgot-password
      body: "*"
    - selector: user.v1.ForgotPasswordService.ValidateResetPasswordToken
      post: /v1/auth/validate-reset-password
      body: "*"
    - selector: user.v1.ForgotPasswordService.ResetPasswordWithToken
      post: /v1/auth/reset-password
      body: "*"
    # crud user
    - selector: user.v1.ManageService.CreateUser
      post: /v1/users
      body: "*"
    - selector: user.v1.ManageService.ListUsers
      get: /v1/users
    - selector: user.v1.ManageService.GetUser
      get: /v1/users/{id}
    - selector: user.v1.ManageService.UpdateUser
      put: /v1/users/{id}
      body: "*"
    - selector: user.v1.ManageService.DeleteUser
      delete: /v1/users/{id}