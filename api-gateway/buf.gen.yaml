version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: "gaman-microservice/api-gateway/gen"
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gen
    strategy: all
    opt:
      - paths=source_relative
      - grpc_api_configuration=gateway.yaml
  - local: protoc-gen-openapiv2
    out: gen
    strategy: all
inputs:
  - directory: ../protos
    paths:
      - ../protos/proto/user
      - ../protos/proto/common
