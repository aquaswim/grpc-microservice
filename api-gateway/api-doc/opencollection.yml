opencollection: 1.0.0

info:
  name: gaman-ms-gateway
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{__login_token}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
