info:
  name: create user
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v1/users"
  body:
    type: json
    data: |-
      {
        "username": "{{$randomFirstName}}{{$isoTimestamp}}",
        "email": "{{$randomEmail}}",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
