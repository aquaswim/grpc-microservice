version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: "gaman-microservice/user-service/gen"
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
inputs:
  - directory: ../protos
    paths:
      - ../protos/proto/user
      - ../protos/proto/common
