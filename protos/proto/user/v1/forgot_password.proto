syntax = "proto3";

package user.v1;

import "buf/validate/validate.proto";
import "common/v1/method_description.proto";

option go_package = "user/v1;userv1";

service ForgotPasswordService {
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse) {
    option (common.v1.rate_limit) = 3;
  }
  rpc ValidateResetPasswordToken(ValidateResetPasswordTokenRequest) returns (ValidateResetPasswordTokenResponse) {
    option (common.v1.rate_limit) = 5;
  }
  rpc ResetPasswordWithToken(ResetPasswordWithTokenRequest) returns (ResetPasswordWithTokenResponse) {
    option (common.v1.rate_limit) = 5;
  }
}

message ForgotPasswordRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message ForgotPasswordResponse {
  bool success = 1;
  string message = 2;
}

message ValidateResetPasswordTokenRequest {
  string token = 1 [(buf.validate.field).required = true];
}

message ValidateResetPasswordTokenResponse {
  bool valid = 1;
  string message = 2;
}

message ResetPasswordWithTokenRequest {
  string token = 1 [(buf.validate.field).required = true];
  string new_password = 2 [
    (buf.validate.field).string.max_len = 254,
    (buf.validate.field).string.min_len = 6
  ];
}

message ResetPasswordWithTokenResponse {
  bool success = 1;
  string message = 2;
}
