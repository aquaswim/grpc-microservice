syntax = "proto3";

package user.v1;

import "common/v1/method_description.proto";
import "common/v1/token_payload.proto";
import "user/v1/user.proto";

option go_package = "user/v1;userv1";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetMyProfile(GetMyProfileRequest) returns (GetMyProfileResponse) {
    option (common.v1.need_auth) = true;
  }
  rpc UpdateMyProfile(UpdateMyProfileRequest) returns (UpdateMyProfileResponse) {
    option (common.v1.need_auth) = true;
  }
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string expires_at = 2;
}

message GetMyProfileRequest {}

message GetMyProfileResponse {
  User user = 1;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string token = 1;
  common.v1.TokenPayload data = 2;
}

message UpdateMyProfileRequest {
  optional string username = 1;
  optional string password = 2;
  optional string email = 3;
}

message UpdateMyProfileResponse {
  bool success = 1;
}
