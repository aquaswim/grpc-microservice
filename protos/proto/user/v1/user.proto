syntax = "proto3";

package user.v1;

option go_package = "gaman-microservice/user-service/gen/user/v1;userv1";

service UserService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetProfileById(GetProfileByIdRequest) returns (GetProfileByIdResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string expires_at = 2;
}

message GetProfileByIdRequest {
  string user_id = 1;
}

message GetProfileByIdResponse {
  string user_id = 1;
  string username = 2;
  string email = 3;
}
