syntax = "proto3";

package event.v1;

option go_package = "event/v1;eventv1";

message UserForgotPassword {
  string reset_token = 1;
  int64 expired_at = 2;
  string user_id = 3;
  string username = 4;
  string email = 5;
}

message UserResetPasswordDone {
  string user_id = 1;
  string username = 2;
  string email = 3;
}
